# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint & Typecheck
        run: eslint src/ && tsc --noEmit
      - name: Test
        run: jest
      - name: Layer check
        run: bash scripts/layer-check.sh src/
