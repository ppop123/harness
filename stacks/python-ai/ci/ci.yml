# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e '.[dev]' || pip install -r requirements.txt
      - name: Lint & Typecheck
        run: ruff check src/
      - name: Test
        run: pytest tests/ -v
      - name: Layer check
        run: bash scripts/layer-check.sh src/
